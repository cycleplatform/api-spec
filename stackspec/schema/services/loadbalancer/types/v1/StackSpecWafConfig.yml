title: StackSpecWafConfig
type: object
description: Additional configuration options for the web application firewall.
required:
  - rules
properties:
  rules:
    oneOf:
      - type: array
        items:
          oneOf:
            - type: object
              required:
                - description
                - skip
                - type
                - conditions
              properties:
                description:
                  description: Some information about the rule.
                  oneOf:
                    - type: string
                    - $ref: ../../../../StackVariable.yml
                skip:
                  description: A boolean that indicates if the rule should be active or skipped.
                  oneOf:
                    - type: boolean
                    - $ref: ../../../../StackVariable.yml
                type:
                  description: |
                    A string that describes if the role should allow, deny, or block traffic based on the conditions.
                    - block = http 403
                    - deny = connection disconnect
                  oneOf:
                    - type: string
                      enum:
                        - allow
                        - deny
                        - block
                    - $ref: ../../../../StackVariable.yml
                expires:
                  description: The expiration date of the WAF config, if present.
                  oneOf:
                    - type: string
                      format: date-time
                      examples:
                        - "2021-01-30T08:30:00Z"
                    - $ref: ../../../../StackVariable.yml
                    - type: "null"
                match:
                  description: A string that describes if both attributes need to be true (match all) or if only one of the conditions needs to be true (match any).
                  oneOf:
                    - type: string
                      enum:
                        - any
                        - all
                    - $ref: ../../../../StackVariable.yml
                sample:
                  description: |
                    Percentage range from 0 to 100
                    Sample = 100 => the rule is applied to 100% of requests
                    Sample = 0 => the rule applies to 0% of requests
                  oneOf:
                    - type: integer
                    - type: "null"
                    - $ref: ../../../../StackVariable.yml
                conditions:
                  description: An array of the specific conditions for the rule.
                  oneOf:
                    - type: array
                      items:
                        oneOf:
                          - type: object
                            required:
                              - type
                              - operator
                              - value
                            properties:
                              type:
                                description: A string that describes the match type for the condition.
                                oneOf:
                                  - type: string
                                    enum:
                                      - ip-match
                                      - geo-match
                                      - http-url-match
                                      - http-method-match
                                      - http-header-match
                                      - http-body-match
                                  - $ref: ../../../../StackVariable.yml
                              operator:
                                description: |
                                  Defines the comparison operator used to evaluate the rule condition
                                  against the provided `value`.
                                oneOf:
                                  - type: string
                                    enum:
                                      - "=="
                                      - "!="
                                      - "*="
                                      - "!*="
                                      - "^="
                                      - "!^="
                                      - ">"
                                      - "<"
                                      - ">="
                                      - "<="
                                    x-enum-descriptions:
                                      - "Equal to — the condition value must exactly match."
                                      - "Not equal to — the condition value must differ."
                                      - "Contains — the request value must contain the provided substring."
                                      - "Does not contain — the request value must not contain the substring."
                                      - "Starts with — the request value must begin with the provided prefix."
                                      - "Does not start with — the request value must not begin with the prefix."
                                      - "Greater than — numeric comparison."
                                      - "Less than — numeric comparison."
                                      - "Greater than or equal — numeric comparison."
                                      - "Less than or equal — numeric comparison."
                                  - $ref: ../../../../StackVariable.yml
                              value:
                                description: The value corresponding to the condition type.
                                examples:
                                  - "0.0.0.0/0"
                                oneOf:
                                  - type: string
                                  - $ref: ../../../../StackVariable.yml
                              key:
                                description: |
                                  An optional key used to target a specific attribute within the condition type.
                                  For example, when using `http-header-match`, the key would be the header name (e.g., `X-Forwarded-For`).
                                oneOf:
                                  - type: string
                                  - type: "null"
                                  - $ref: ../../../../StackVariable.yml
                              regex:
                                description: |
                                  When `true`, the `value` field is interpreted as a regular expression pattern
                                  rather than a literal string. Allows for advanced pattern matching on condition values.
                                oneOf:
                                  - type: boolean
                                  - $ref: ../../../../StackVariable.yml
                          - $ref: ../../../../StackVariable.yml
                    - $ref: ../../../../StackVariable.yml
            - $ref: ../../../../StackVariable.yml
      - $ref: ../../../../StackVariable.yml
